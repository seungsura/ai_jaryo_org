<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #0A0A0B;
            color: #E0E0E0;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }
        .header {
            position: relative;
            z-index: 10;
            padding-top: 60px;
            padding-left: 80px;
            margin-bottom: 40px;
        }
        .header h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 48px;
            color: #00F2FF;
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        .header .line {
            width: 100px;
            height: 4px;
            background: #FF2E63;
            margin-top: 10px;
        }
        .main-content {
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            padding-left: 80px;
            padding-right: 80px;
            flex-grow: 1;
        }
        .text-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .point {
            margin-bottom: 40px;
        }
        .point-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            color: #FF2E63;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .point-desc {
            font-size: 18px;
            line-height: 1.6;
            color: #B0B0B0;
        }
        .image-area {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-area img {
            width: 600px;
            height: 400px;
            object-fit: contain;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }
        .footer {
            position: relative;
            z-index: 10;
            padding-top: 20px;
            padding-left: 80px;
            padding-right: 80px;
            padding-bottom: 40px;
            display: flex;
            justify-content: space-between;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            color: rgba(224, 224, 224, 0.3);
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="grid-bg"></div>
        
        <header class="header">
            <h2>코딩의 종말이 아닌 '숙련의 이동'</h2>
            <div class="line"></div>
        </header>

        <div class="main-content">
            <div class="text-area">
                <div class="point">
                    <div class="point-title">Shift in Expertise</div>
                    <div class="point-desc">코딩의 존재 여부가 아닌, 숙련이 드러나는 위치가 변하고 있습니다.</div>
                </div>
                <div class="point">
                    <div class="point-title">From Hands to Design</div>
                    <div class="point-desc">손끝의 속도에서 하네스를 설계하고 운영하는 능력으로 이동합니다.</div>
                </div>
                <div class="point">
                    <div class="point-title">Beyond AI FoMO</div>
                    <div class="point-desc">AI FoMO를 넘어, 일의 통제권을 어떻게 유지할 것인가가 핵심입니다.</div>
                </div>
            </div>
            <div class="image-area">
                <img src="/mnt/desktop/jaryo/output/screenshots/slide-12.png" alt="Shift in Bottleneck">
            </div>
        </div>

        <footer class="footer">
            <span>MANUS AGENTIC SYSTEMS // HARNESS PROJECT</span>
            <span>PAGE 01</span>
        </footer>
    </div>
</body>
</html>
