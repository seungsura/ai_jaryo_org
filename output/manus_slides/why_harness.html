<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #0A0A0B;
            color: #E0E0E0;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }
        .header {
            position: relative;
            z-index: 10;
            padding-top: 60px;
            padding-left: 80px;
        }
        .header h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 48px;
            color: #00F2FF;
            text-transform: uppercase;
        }
        .main-content {
            position: relative;
            z-index: 10;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-left: 80px;
            padding-right: 80px;
        }
        .hero-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 36px;
            color: #FF2E63;
            text-align: center;
            margin-bottom: 60px;
            max-width: 900px;
            line-height: 1.4;
        }
        .reasons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 40px;
            width: 100%;
        }
        .reason-item {
            border-top: 1px solid rgba(0, 242, 255, 0.3);
            padding-top: 20px;
        }
        .reason-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            color: #00F2FF;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .reason-desc {
            font-size: 16px;
            line-height: 1.6;
            color: #B0B0B0;
        }
        .footer {
            position: relative;
            z-index: 10;
            padding-top: 20px;
            padding-left: 80px;
            padding-right: 80px;
            padding-bottom: 40px;
            display: flex;
            justify-content: space-between;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            color: rgba(224, 224, 224, 0.3);
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="grid-bg"></div>
        
        <header class="header">
            <h2>왜 지금 '하네스(Harness)'인가?</h2>
        </header>

        <div class="main-content">
            <div class="hero-text">
                "에이전트의 자율성이 높아질수록,<br>잘못된 판단도 더 빠르게 실행됩니다."
            </div>
            
            <div class="reasons-grid">
                <div class="reason-item">
                    <div class="reason-title">Risk Management</div>
                    <div class="reason-desc">초안 생산 속도가 커질수록 품질을 통제하는 구조의 가치가 커집니다.</div>
                </div>
                <div class="reason-item">
                    <div class="reason-title">Operational Structure</div>
                    <div class="reason-desc">모델의 성능보다 중요한 것은 그 모델을 올릴 '운영 구조'입니다.</div>
                </div>
                <div class="reason-item">
                    <div class="reason-title">Stability</div>
                    <div class="reason-desc">하네스는 모델의 변화 속에서도 팀의 원칙을 붙들어 주는 층입니다.</div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <span>MANUS AGENTIC SYSTEMS // HARNESS PROJECT</span>
            <span>PAGE 02</span>
        </footer>
    </div>
</body>
</html>
