<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #0A0A0B;
            color: #E0E0E0;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }
        .header {
            position: relative;
            z-index: 10;
            padding-top: 60px;
            padding-left: 80px;
            margin-bottom: 60px;
        }
        .header h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 48px;
            color: #00F2FF;
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        .header .line {
            width: 100px;
            height: 4px;
            background: #FF2E63;
            margin-top: 10px;
        }
        .main-content {
            position: relative;
            z-index: 10;
            flex-grow: 1;
            display: flex;
            justify-content: space-between;
            padding-left: 80px;
            padding-right: 80px;
            align-items: flex-start;
        }
        .step-item {
            width: 30%;
            position: relative;
        }
        .step-number {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 80px;
            color: rgba(0, 242, 255, 0.1);
            position: absolute;
            top: -40px;
            left: -10px;
            z-index: -1;
        }
        .step-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            color: #FF2E63;
            margin-bottom: 20px;
            text-transform: uppercase;
            border-bottom: 2px solid #FF2E63;
            padding-bottom: 10px;
            display: inline-block;
        }
        .step-desc {
            font-size: 18px;
            line-height: 1.6;
            color: #B0B0B0;
        }
        .step-desc strong {
            color: #00F2FF;
            display: block;
            margin-bottom: 10px;
        }
        .footer {
            position: relative;
            z-index: 10;
            padding-top: 20px;
            padding-left: 80px;
            padding-right: 80px;
            padding-bottom: 40px;
            display: flex;
            justify-content: space-between;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            color: rgba(224, 224, 224, 0.3);
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="grid-bg"></div>
        
        <header class="header">
            <h2>실전 워크플로우: Plan-Critic-Build</h2>
            <div class="line"></div>
        </header>

        <div class="main-content">
            <div class="step-item">
                <div class="step-number">01</div>
                <div class="step-title">Plan</div>
                <div class="step-desc">
                    <strong>구현 전 계획 문서화</strong>
                    구현을 시작하기 전, 변경 계획과 잠재적 위험 요소를 먼저 텍스트로 정의합니다.
                </div>
            </div>

            <div class="step-item">
                <div class="step-number">02</div>
                <div class="step-title">Critic</div>
                <div class="step-desc">
                    <strong>논리적 허점 비판</strong>
                    작성된 계획의 빈틈과 부작용을 에이전트와 함께 비판적으로 검토합니다.
                </div>
            </div>

            <div class="step-item">
                <div class="step-number">03</div>
                <div class="step-title">Build</div>
                <div class="step-desc">
                    <strong>합의 후 실행 통합</strong>
                    충분히 검증되고 합의된 계획에 대해서만 실제 코드 구현과 통합을 진행합니다.
                </div>
            </div>
        </div>

        <footer class="footer">
            <span>MANUS AGENTIC SYSTEMS // HARNESS PROJECT</span>
            <span>PAGE 05</span>
        </footer>
    </div>
</body>
</html>
