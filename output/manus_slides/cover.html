<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #0A0A0B;
            color: #E0E0E0;
            font-family: 'Inter', sans-serif;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        /* Grid Background */
        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }
        .accent-line {
            position: absolute;
            top: 50px; right: 50px;
            width: 200px; height: 2px;
            background: #FF2E63;
            z-index: 2;
        }
        .tech-marker {
            position: absolute;
            top: 60px; right: 50px;
            font-family: 'Space Grotesk', sans-serif;
            color: #FF2E63;
            font-size: 14px;
            letter-spacing: 2px;
            z-index: 2;
        }
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 1000px;
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 72px;
            color: #00F2FF;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }
        .subtitle {
            font-size: 28px;
            color: #E0E0E0;
            font-weight: 400;
            opacity: 0.8;
            border-left: 4px solid #FF2E63;
            padding-left: 20px;
            display: inline-block;
        }
        .footer-info {
            position: absolute;
            bottom: 50px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            color: rgba(224, 224, 224, 0.4);
            letter-spacing: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="grid-bg"></div>
        <div class="accent-line"></div>
        <div class="tech-marker">SYSTEM STATUS: OPERATIONAL</div>
        
        <div class="content">
            <h1>Harness</h1>
            <div class="subtitle">에이전틱 코딩 시대의 생존 전략<br>AI와 함께 일하는 법, 도구보다 구조를 설계하라</div>
        </div>

        <div class="footer-info">MANUS AGENTIC SYSTEMS // 2026</div>
    </div>
</body>
</html>
