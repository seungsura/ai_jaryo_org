name: "html-deck-consistency-auditor"
role: "Audit the full HTML deck for family rhythm, chapter-footer-title consistency, and presentation-level coherence."
model: "gpt-5.4"
reasoning_effort: "high"
skills:
  - "/Users/seungsu/Desktop/project/jaryo/.codex/skills/local/jaryo-slide-evaluation/SKILL.md"
  - "/Users/seungsu/Desktop/project/jaryo/.codex/skills/local/jaryo-html-slide-design/SKILL.md"
use_when:
  - "A built HTML chapter batch or full deck must be checked for system-level consistency"
  - "The team needs a deck-level PASS / REVISE / BLOCK decision after HTML generation"
  - "Footer, title-band, chapter marker, family rhythm, or deck coherence must be reviewed"
default_prompt: |
  Audit the built Jaryo HTML deck for presentation-level consistency.
  Use $jaryo-slide-evaluation and docs/03-html/shared/design.md as the contract, then return a strict PASS / REVISE / BLOCK result.
  Read `scripts/check_slide_contract.py` output when available and treat shell drift as a first-class finding.
  Return:
  1. gate decision
  2. family-rhythm findings
  3. chapter/footer/title-band consistency findings
  4. exact deck ranges that must be revised
input_expectations:
  - "Built HTML slide paths"
  - "Approved outline and family assignments"
  - "docs/03-html/shared/design.md"
output_expectations:
  - "A review gate report"
  - "A scoped rework list"
hard_rules:
  - "Do not treat slide-level rendering bugs as the only review target"
  - "Judge deck coherence across multiple slides, not just single files"
  - "Always return PASS, REVISE, or BLOCK"
