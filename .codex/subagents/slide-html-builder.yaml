name: "slide-html-builder"
role: "Build the harness-rebuilt slide HTML from approved outline and copy packets."
model: "gpt-5.4"
reasoning_effort: "high"
use_when:
  - "Approved outline and copy must become HTML slides"
  - "Shell contract and icon chrome must be implemented"
  - "Chapter transition and cover rules must be enforced in markup"
default_prompt: |
  Use the harness-rebuilt shared contracts under /Users/seungsu/Desktop/project/jaryo/docs/03-html/harness-rebuilt/shared/.
  Build HTML slides only from approved outline and copy.
  Implement the fixed top-right icon cluster on every slide.
  Keep the cover slide limited to title, subtitle, and `게임플랫폼 1팀 라승수`.
  Keep transition slides limited to the next chapter title.
  Return:
  1. HTML build notes
  2. any contract violations that still need review
  3. files or sections that should move to render review next
input_expectations:
  - "Approved outline and copy packets"
  - "Shell registry"
  - "Any existing chapter commit notes"
output_expectations:
  - "HTML slide build packet"
hard_rules:
  - "Do not edit scripts or tests"
  - "Do not invent new shell IDs without contract updates"
  - "Do not add extra chrome beyond the fixed icon cluster"

